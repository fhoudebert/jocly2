<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Gigachess II</title>
    <meta name="description" content="14*14 chess variant with fairy pieces">
    <meta name="author" content="Jocly">
    <link rel="stylesheet" href="css/styles.css">
    <link href="css/control-styles" rel="stylesheet">
    <script src="js/jquery-3.2.1.min.js" integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="game-area1" class="game-area">
      <div id="progress-bar"></div>
    </div>
    <div id="controls">
      <div id="ctrl-controls">
        <p id="cc-close"> <a class="game-item-button game-item-button-grey" href="javascript:closePanel();">Close
            control panel</a> </p>
        <p id="cc-open"> <a href="javascript:openPanel();"><img class="ctrl-btn"
              src="images/settings.png"></a> </p>
      </div>
      <div id="game-status" style="display: inline;" class="box">Status</div>
      <div id="mode-panel" style="display: inline;" class="box">
        <h3>Controls</h3>
        <button id="restart">Restart game</button> <button id="takeback">Take
          back</button> <button id="fullscreen" style="display: none;">Full
          screen</button><br>
        <br>
        <select id="mode">
          <option value="self-self">Self / Self</option>
          <option value="self-comp">Self / Computer</option>
          <option value="comp-self">Computer / Self</option>
          <option value="comp-comp">Computer / Computer</option>
        </select>
        <br>
        <br>
        <label id="level-a" for="select-level-PLAYER_A">Computer(A) level
          <select id="select-level-a">
          </select>
          <br>
          <br>
        </label> <label id="level-b" for="select-level-b">Computer(B) level
          <select id="select-level-b">
          </select>
          <br>
          <br>
        </label> </div>
      <div id="options" style="display: inline;" class="box">
        <h3>Options</h3>
        <div id="view-options">
          <select id="options-skin">
          </select>
          <select id="view-as" style="display: inline;">
            <option value="player-a">View as player A</option>
            <option value="player-b">View as player B</option>
          </select>
          <br>
          <br>
          <label id="options-notation" for="options-notation-input"> <input id="options-notation-input"
              type="checkbox"> Notation<br>
          </label> <label id="options-moves" for="options-moves-input"> <input
              id="options-moves-input" type="checkbox"> Show possible moves<br>
          </label> <label id="options-autocomplete" for="options-autocomplete-input">
            <input id="options-autocomplete-input" type="checkbox">
            Auto-complete moves<br>
          </label> <label id="options-sounds" for="options-sounds-input"> <input
              id="options-sounds-input" type="checkbox"> Sounds<br>
          </label> </div>
      </div>
      <div id="games" style="display: inline">
        <div>
          <div>
            <div id="close-games"> <span>« Back</span> </div>
            <div id="game-list"></div>
          </div>
        </div>
      </div>
      <script>
	var glbGameName="giga-chessII";
    <script src="../../dist/browser/jocly.js"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
        crossorigin="anonymous"></script>
    <script src="js/control.js"></script>
  </body>
</html>
